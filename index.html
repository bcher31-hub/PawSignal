<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PawSignal</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #F8FAFC;
      text-align: center;
    }

    .hero { padding: 70px 20px 30px; }

    h1 { font-size: 48px; }
    h2 { color: #2F80ED; }

    .btn {
      background: #EB5757;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
    }

    input, textarea {
      padding: 10px;
      width: 250px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    textarea { height: 80px; }

    #map {
      height: 400px;
      width: 90%;
      margin: auto;
      border-radius: 10px;
    }

    .section {
      padding: 50px 20px;
    }

    .dark {
      background: #111827;
      color: white;
    }

    #pet_list {
      margin-top: 20px;
    }

    #radius {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>🐾 PawSignal</h1>
  <h2>Bring them home faster.</h2>

  <input id="email" placeholder="Enter email"/>
  <br/>
  <button class="btn" onclick="submitEmail()">Join</button>
  <p id="status"></p>

  <h3>Report Lost Pet</h3>
  <input id="pet_name" placeholder="Name"/><br/>
  <input id="pet_type" placeholder="Type"/><br/>
  <input id="location" placeholder="Last Seen"/><br/>
  <input id="contact" placeholder="Contact"/><br/>
  <input type="file" id="pet_image"/><br/>
  <textarea id="description" placeholder="Description"></textarea><br/>

  <button class="btn" onclick="submitPet()">Submit</button>
  <p id="pet_status"></p>
</div>

<div id="pet_list"></div>

<!-- RADIUS (FIXED POSITION + SAFE INIT) -->
<div style="margin-top:20px;">
  <h3>Alert Radius (miles)</h3>
  <input id="radius" type="number" value="10"/>
</div>

<h3 style="margin-top:30px;">Lost Pets Map 🗺️</h3>
<div id="map"></div>

<!-- MESSAGE AFTER MAP (FIXED ORDER REQUIREMENT) -->
<div class="section dark">
  <h2>Every minute matters.</h2>
  <p>Most pets are found within 24 hours — speed matters.</p>
</div>

<div class="section">
  <h2>Meet PawSignal</h2>
  <p>A live lost pet recovery network.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map;
let userLocation = null;
let radiusCircle = null;
window.petMarkers = [];

const client = supabase.createClient(
  "https://ofbuiybymxkviplrbxls.supabase.co",
  "YOUR_SUPABASE_ANON_KEY"
);

// ---------------- MAP INIT ----------------
window.addEventListener("DOMContentLoaded", () => {

  map = L.map("map").setView([27.95, -82.46], 10);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; OpenStreetMap"
  }).addTo(map);

  // FIX: ensure DOM + map ready before radius/events
  setTimeout(() => {
    initApp();
  }, 300);
});

// ---------------- APP INIT ----------------
function initApp() {

  navigator.geolocation.getCurrentPosition((pos) => {

    userLocation = {
      lat: pos.coords.latitude,
      lng: pos.coords.longitude
    };

    map.setView([userLocation.lat, userLocation.lng], 12);

    L.marker([userLocation.lat, userLocation.lng])
      .addTo(map)
      .bindPopup("📍 You are here");

    drawRadius();
    loadPets();

  });

  // FIX: radius listener ONLY after DOM ready
  document.getElementById("radius").addEventListener("input", () => {
    drawRadius();
    loadPets();
  });
}

// ---------------- DISTANCE ----------------
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 3958.8;
  const dLat = (lat2 - lat1) * Math.PI/180;
  const dLon = (lon2 - lon1) * Math.PI/180;

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// ---------------- RADIUS ----------------
function drawRadius() {
  if (!map || !userLocation) return;

  const radius = parseFloat(document.getElementById("radius").value) || 10;

  if (radiusCircle) map.removeLayer(radiusCircle);

  radiusCircle = L.circle([userLocation.lat, userLocation.lng], {
    radius: radius * 1609,
    color: "blue",
    fillOpacity: 0.1
  }).addTo(map);
}

// ---------------- PETS ----------------
async function loadPets() {

  if (!map || !userLocation) return;

  const { data } = await client
    .from("lost_pets")
    .select("*");

  const container = document.getElementById("pet_list");

  container.innerHTML = data.map(p => `
    <div style="border:1px solid #ddd;margin:10px;padding:10px;">
      <b>${p.name}</b><br/>
      ${p.type}<br/>
      ${p.last_seen_location}<br/>
      ${p.description}<br/>

      ${p.image_url
        ? `<img src="${p.image_url}" style="width:180px;margin-top:10px;border-radius:8px;" />`
        : ""}
    </div>
  `).join("");

  // clear markers safely
  window.petMarkers.forEach(m => map.removeLayer(m));
  window.petMarkers = [];

  const radius = parseFloat(document.getElementById("radius").value) || 10;

  data.forEach(p => {
    if (!p.latitude || !p.longitude) return;

    const d = getDistance(
      userLocation.lat,
      userLocation.lng,
      p.latitude,
      p.longitude
    );

    if (d <= radius) {
      const marker = L.marker([p.latitude, p.longitude])
        .addTo(map)
        .bindPopup(`${p.name} - ${d.toFixed(1)} miles`);

      window.petMarkers.push(marker);
    }
  });
}

// ---------------- EMAIL ----------------
async function submitEmail() {
  const email = document.getElementById("email").value;

  await client.from("waitlist").insert([{ email }]);

  document.getElementById("status").innerText = "Saved 🐾";
}

// ---------------- PET SUBMIT ----------------
async function submitPet() {

  let coords = { latitude: null, longitude: null };

  try {
    const pos = await new Promise((res, rej) =>
      navigator.geolocation.getCurrentPosition(res, rej)
    );

    coords = {
      latitude: pos.coords.latitude,
      longitude: pos.coords.longitude
    };
  } catch {}

  let imageUrl = null;
  const file = document.getElementById("pet_image").files[0];

  if (file) {
    const fileName = Date.now() + "_" + file.name;

    await client.storage
      .from("pet-images")
      .upload(fileName, file);

    const { data } = client.storage
      .from("pet-images")
      .getPublicUrl(fileName);

    imageUrl = data.publicUrl;
  }

  await client.from("lost_pets").insert([{
    name: pet_name.value,
    type: pet_type.value,
    last_seen_location: location.value,
    contact_info: contact.value,
    description: description.value,
    latitude: coords.latitude,
    longitude: coords.longitude,
    image_url: imageUrl
  }]);

  document.getElementById("pet_status").innerText = "Pet posted 🐾";

  loadPets();
}

</script>
</body>
</html>
