<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PawSignal</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #F8FAFC;
      text-align: center;
    }

    .hero { padding: 70px 20px 30px; }

    h1 { font-size: 48px; }
    h2 { color: #2F80ED; }

    .btn {
      background: #EB5757;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
    }

    input, textarea {
      padding: 10px;
      width: 250px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    textarea { height: 80px; }

    #map {
      height: 400px;
      width: 90%;
      margin: auto;
      border-radius: 10px;
    }

    .section {
      padding: 50px 20px;
    }

    .dark {
      background: #111827;
      color: white;
    }

    #pet_list {
      margin-top: 20px;
    }

    #radius {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>🐾 PawSignal</h1>
  <h2>Bring them home faster.</h2>

  <input id="email" placeholder="Enter email"/>
  <br/>
  <button class="btn" onclick="submitEmail()">Join</button>
  <p id="status"></p>

  <h3>Report Lost Pet</h3>
  <input id="pet_name" placeholder="Name"/><br/>
  <input id="pet_type" placeholder="Type"/><br/>
  <input id="location" placeholder="Last Seen"/><br/>
  <input id="contact" placeholder="Contact"/><br/>
  <input type="file" id="pet_image"/><br/>
  <textarea id="description" placeholder="Description"></textarea><br/>

  <button class="btn" onclick="submitPet()">Submit</button>
  <p id="pet_status"></p>
</div>

<div id="pet_list"></div>

<!-- RADIUS (FIXED POSITION + SAFE INIT) -->
<div style="margin-top:20px;">
  <h3>Alert Radius (miles)</h3>
  <input id="radius" type="number" value="10"/>
</div>

<h3 style="margin-top:30px;">Lost Pets Map 🗺️</h3>
<div id="map"></div>

<!-- MESSAGE AFTER MAP (FIXED ORDER REQUIREMENT) -->
<div class="section dark">
  <h2>Every minute matters.</h2>
  <p>Most pets are found within 24 hours — speed matters.</p>
</div>

<div class="section">
  <h2>Meet PawSignal</h2>
  <p>A live lost pet recovery network.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

console.log("PawSignal MVP booting...");

// ================= STATE =================
const state = {
  map: null,
  userLocation: null,
  pets: [],
  markers: [],
  radiusCircle: null
};

// ================= SUPABASE =================
const client = supabase.createClient(
  "https://ofbuiybymxkviplrbxls.supabase.co",
  "YOUR_SUPABASE_ANON_KEY"
);

// ================= INIT =================
window.addEventListener("DOMContentLoaded", () => {

  initMap();
  initRadiusListener();
  loadPets(); // ALWAYS load even without location
  initLocation(); // optional

});

// ================= MAP =================
function initMap() {
  state.map = L.map("map").setView([27.95, -82.46], 10);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; OpenStreetMap"
  }).addTo(state.map);

  setTimeout(() => state.map.invalidateSize(), 400);
}

// ================= LOCATION =================
function initLocation() {
  navigator.geolocation.getCurrentPosition(
    (pos) => {

      state.userLocation = {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
      };

      state.map.setView([state.userLocation.lat, state.userLocation.lng], 12);

      L.marker([state.userLocation.lat, state.userLocation.lng])
        .addTo(state.map)
        .bindPopup("📍 You are here");

      drawRadius();
      renderPets();

    },
    () => console.warn("Location denied (app still works)")
  );
}

// ================= DISTANCE =================
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 3958.8;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// ================= RADIUS =================
function initRadiusListener() {
  const el = document.getElementById("radius");

  if (!el) return;

  el.addEventListener("input", () => {
    drawRadius();
    renderPets();
  });
}

function drawRadius() {
  if (!state.map || !state.userLocation) return;

  const radius = Number(document.getElementById("radius").value || 10);

  if (state.radiusCircle) {
    state.map.removeLayer(state.radiusCircle);
  }

  state.radiusCircle = L.circle(
    [state.userLocation.lat, state.userLocation.lng],
    {
      radius: radius * 1609,
      color: "blue",
      fillOpacity: 0.15
    }
  ).addTo(state.map);
}

// ================= LOAD PETS =================
async function loadPets() {
  try {

    const { data, error } = await client
      .from("lost_pets")
      .select("*");

    if (error) {
      console.error("Supabase error:", error);
      return;
    }

    state.pets = data || [];

    renderPets();

  } catch (err) {
    console.error("Fatal load error:", err);
  }
}

// ================= RENDER =================
function renderPets() {

  const container = document.getElementById("pet_list");
  if (!container) return;

  const radius = Number(document.getElementById("radius")?.value || 10);

  // clear markers safely
  state.markers.forEach(m => state.map.removeLayer(m));
  state.markers = [];

  container.innerHTML = state.pets.map(p => {

    const img = p.image_url
      ? `<img src="${p.image_url}" style="width:180px;border-radius:8px;margin-top:10px;" />`
      : "";

    return `
      <div style="border:1px solid #ddd;margin:10px;padding:10px;">
        <b>${p.name || "Unknown"}</b><br/>
        ${p.type || ""}<br/>
        ${p.last_seen_location || ""}<br/>
        ${p.description || ""}<br/>
        ${img}
      </div>
    `;
  }).join("");

  // map markers
  state.pets.forEach(p => {

    if (!p.latitude || !p.longitude) return;

    if (state.userLocation) {

      const d = getDistance(
        state.userLocation.lat,
        state.userLocation.lng,
        p.latitude,
        p.longitude
      );

      if (d > radius) return;

      const marker = L.marker([p.latitude, p.longitude])
        .addTo(state.map)
        .bindPopup(`${p.name || "Pet"} - ${d.toFixed(1)} miles`);

      state.markers.push(marker);

    } else {

      const marker = L.marker([p.latitude, p.longitude])
        .addTo(state.map);

      state.markers.push(marker);
    }
  });
}

// ================= SUBMIT EMAIL =================
async function submitEmail() {
  const email = document.getElementById("email").value;

  await client.from("waitlist").insert([{ email }]);

  document.getElementById("status").innerText = "Saved 🐾";
}

// ================= SUBMIT PET =================
async function submitPet() {

  let coords = { latitude: null, longitude: null };

  try {
    const pos = await new Promise((res, rej) =>
      navigator.geolocation.getCurrentPosition(res, rej)
    );

    coords = {
      latitude: pos.coords.latitude,
      longitude: pos.coords.longitude
    };
  } catch {}

  let imageUrl = null;
  const file = document.getElementById("pet_image").files[0];

  if (file) {

    const fileName = Date.now() + "_" + file.name;

    await client.storage
      .from("pet-images")
      .upload(fileName, file);

    const { data } = client.storage
      .from("pet-images")
      .getPublicUrl(fileName);

    imageUrl = data.publicUrl;
  }

  await client.from("lost_pets").insert([{
    name: document.getElementById("pet_name").value,
    type: document.getElementById("pet_type").value,
    last_seen_location: document.getElementById("location").value,
    contact_info: document.getElementById("contact").value,
    description: document.getElementById("description").value,
    latitude: coords.latitude,
    longitude: coords.longitude,
    image_url: imageUrl
  }]);

  document.getElementById("pet_status").innerText = "Posted 🐾";

  await loadPets();
}

</script>
</body>
</html>
