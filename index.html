<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PawSignal</title>

  <style>
    .section {
  padding: 60px 20px;
  background: white;
}

.section.dark {
  background: #111827;
  color: white;
}

.section.dark p {
  color: #d1d5db;
}
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #F8FAFC;
      text-align: center;
    }

    .hero {
      padding: 80px 20px;
    }

    h1 { font-size: 48px; }
    h2 { color: #2F80ED; }

    .btn {
      background: #EB5757;
      color: white;
      padding: 14px 24px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
    }

    input, textarea {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      width: 250px;
      margin-top: 10px;
    }

    textarea { height: 80px; }

    #map {
      height: 400px !important;
      width: 90%;
      margin: auto;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>🐾 PawSignal</h1>
  <h2>Bring them home faster.</h2>

  <p>Helping lost pets get found faster in Tampa and beyond 🐾</p>

  <input id="email" type="email" placeholder="Enter your email" />
  <br/>
  <button class="btn" onclick="submitEmail()">Join Waitlist</button>
  <p id="status"></p>

  <div style="margin-top:40px;">
    <h3>Report a Lost Pet 🐾</h3>

    <input id="pet_name" placeholder="Pet Name" /><br/>
    <input id="pet_type" placeholder="Dog or Cat" /><br/>
    <input id="location" placeholder="Last Seen Location" /><br/>
    <input id="contact" placeholder="Your Contact Info" /><br/>
    <input type="file" id="pet_image" /><br/>
    <textarea id="description" placeholder="Description"></textarea><br/>

    <button class="btn" onclick="submitPet()">Submit Report</button>
    <p id="pet_status"></p>
  </div>
</div>

<div style="margin-top:50px;">
  <h3>Recently Reported Pets 🐾</h3>
  <div id="pet_list"></div>
</div>

<div style="margin-top:30px;">
  <h3>Alert Radius</h3>
  <input id="radius" type="number" value="10" />
</div>

<div style="margin-top:50px;">
  <h3>Lost Pets Map 🗺️</h3>
  <div id="map"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
console.log("JS LOADED");

let map;
let userLocation = null;
let radiusCircle;
window.petMarkers = [];

const SUPABASE_URL = "https://ofbuiybymxkviplrbxls.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mYnVpeWJ5bXhrdmlwbHJieGxzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4Mzg4MjIsImV4cCI6MjA5MTQxNDgyMn0.3r-GEMyfXde5oOHxahYwnfAR6gUfGX5pvwBpPCASO-s";

const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 3958.8;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI/180) *
    Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function drawRadius() {
  if (!userLocation) return;

  const radius = parseFloat(document.getElementById("radius").value) || 10;

  if (radiusCircle) map.removeLayer(radiusCircle);

  radiusCircle = L.circle([userLocation.lat, userLocation.lng], {
    radius: radius * 1609,
    color: "blue",
    fillOpacity: 0.1
  }).addTo(map);
}

async function submitEmail() {
  const email = document.getElementById("email").value;

  const { error } = await client
    .from("waitlist")
    .insert([{ email }]);

  document.getElementById("status").innerText =
    error ? "Error ❌" : "You're on the list 🐾";
}

async function submitPet() {
  let coords = { latitude: null, longitude: null };

  try {
    const pos = await new Promise((res, rej) =>
      navigator.geolocation.getCurrentPosition(res, rej)
    );
    coords = {
      latitude: pos.coords.latitude,
      longitude: pos.coords.longitude
    };
  } catch {}

  let imageUrl = null;
  const file = document.getElementById("pet_image").files[0];

  if (file) {
    const fileName = Date.now() + "_" + file.name;

    const { error } = await client.storage
      .from("pet-images")
      .upload(fileName, file);

    if (!error) {
      const { data } = client.storage
        .from("pet-images")
        .getPublicUrl(fileName);

      imageUrl = data.publicUrl;
    }
  }

  const { error } = await client.from("lost_pets").insert([{
    name: document.getElementById("pet_name").value,
    type: document.getElementById("pet_type").value,
    last_seen_location: document.getElementById("location").value,
    contact_info: document.getElementById("contact").value,
    description: document.getElementById("description").value,
    latitude: coords.latitude,
    longitude: coords.longitude,
    image_url: imageUrl
  }]);

  document.getElementById("pet_status").innerText =
    error ? "Error ❌" : "Pet reported 🐾";

  loadPets();
}

async function loadPets() {
  if (!map) return;

  const { data, error } = await client
    .from("lost_pets")
    .select("*")
    .order("created_at", { ascending: false });

  const container = document.getElementById("pet_list");

  if (error) {
    container.innerText = "Error loading pets";
    return;
  }

  container.innerHTML = data.map(pet => `
    <div style="border:1px solid #ddd; padding:10px; margin:10px;">
      <strong>${pet.name}</strong> (${pet.type})<br/>
      📍 ${pet.last_seen_location}<br/>
      📝 ${pet.description}<br/>
      📞 ${pet.contact_info}<br/>
      ${pet.image_url ? `<img src="${pet.image_url}" style="width:200px;" />` : ""}
    </div>
  `).join("");

  if (window.petMarkers) {
    window.petMarkers.forEach(m => map.removeLayer(m));
  }
  window.petMarkers = [];

  data.forEach(pet => {
    if (!pet.latitude || !pet.longitude || !userLocation) return;

    const distance = getDistance(
      userLocation.lat,
      userLocation.lng,
      pet.latitude,
      pet.longitude
    );

    const radius = document.getElementById("radius").value || 10;

    if (distance <= radius) {
      const marker = L.marker([pet.latitude, pet.longitude])
        .addTo(map)
        .bindPopup(`
          <b>${pet.name}</b><br/>
          ${pet.type}<br/>
          ${pet.last_seen_location}<br/>
          📏 ${distance.toFixed(1)} miles away
        `);

      window.petMarkers.push(marker);
    }
  });
}

window.addEventListener("DOMContentLoaded", () => {

  console.log("DOM READY");

  map = L.map("map").setView([27.9506, -82.4572], 10);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; OpenStreetMap"
  }).addTo(map);

  navigator.geolocation.getCurrentPosition((pos) => {

    userLocation = {
      lat: pos.coords.latitude,
      lng: pos.coords.longitude
    };

    map.setView([userLocation.lat, userLocation.lng], 12);

    L.marker([userLocation.lat, userLocation.lng])
      .addTo(map)
      .bindPopup("📍 You are here");

    setTimeout(() => map.invalidateSize(), 500);

    drawRadius();
    loadPets();

  });

  document.getElementById("radius").addEventListener("input", () => {
    drawRadius();
    loadPets();
  });
});
</script>

</body>
</html>
